name: deploy-docs
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install Python dependencies
        run: |
          cd python
          pip install .[dev]
      - name: Build MkDocs
        run: |
          mkdocs build --site-dir public

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Generate Kotlin documentation (Dokka)
        run: |
          cd kotlin
          chmod +x gradlew
          ./gradlew dokkaGeneratePublicationHtml
          mkdir -p ../public/kotlin
          cp -r build/dokka/html/* ../public/kotlin/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
