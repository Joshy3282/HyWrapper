name: Kotlin CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./kotlin

    steps:
    - uses: actions/checkout@v6.0.0
    
    - name: Set up JDK 21
      uses: actions/setup-java@v5.0.0
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Run tests
      run: ./gradlew check
      
    - name: Build
      run: ./gradlew build
