name: TypeScript CI

on:
  push:
    branches: [ main ]
    paths:
      - 'typescript/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'typescript/**'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install
      working-directory: typescript

    - name: Run linting
      run: npm run lint
      working-directory: typescript

    - name: Build
      run: npm run build
      working-directory: typescript

    - name: Run tests
      run: npm test
      working-directory: typescript
