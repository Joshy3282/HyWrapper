name: Bug Report
description: Report a bug
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Bug report
  - type: dropdown
    id: language
    attributes:
      label: Language
      description: Which language are you using?
      options:
        - Python
        - TypeScript/Javascript
        - Kotlin/Java
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Library Version
      description: What version of the library are you using?
      placeholder: e.g., 1.0.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Initialize client with ...
        2. Call method ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Error Output
      description: Copy and paste any relevant logs or error messages.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
